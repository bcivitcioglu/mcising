<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Dark background circle -->
  <circle cx="24" cy="24" r="23" fill="#0A0E17"/>

  <!-- 2x2 spin grid behind the text -->
  <circle cx="11" cy="11" r="4" fill="#FF7F45" opacity="0.45"/>
  <circle cx="37" cy="11" r="4" fill="#5CB8E6" opacity="0.45"/>
  <circle cx="11" cy="37" r="4" fill="#5CB8E6" opacity="0.45"/>
  <circle cx="37" cy="37" r="4" fill="#FFE066" opacity="0.45"/>

  <!-- MC text -->
  <text x="24" y="29" font-family="monospace" font-weight="bold" font-size="18" fill="white" text-anchor="middle">MC</text>

  <!-- Small edge spins (lattice feel) -->
  <circle cx="5" cy="24" r="2.5" fill="#FF7F45" opacity="0.6"/>
  <circle cx="43" cy="24" r="2.5" fill="#5CB8E6" opacity="0.6"/>
  <circle cx="24" cy="5" r="2.5" fill="#FFE066" opacity="0.6"/>
  <circle cx="24" cy="43" r="2.5" fill="#FF7F45" opacity="0.6"/>
</svg>
