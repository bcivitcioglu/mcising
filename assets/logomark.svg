<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0E17"/>

  <!-- 2x2 spin grid behind the text -->
  <circle cx="16" cy="16" r="5" fill="#FF7F45" opacity="0.4"/>
  <circle cx="48" cy="16" r="5" fill="#5CB8E6" opacity="0.4"/>
  <circle cx="16" cy="48" r="5" fill="#5CB8E6" opacity="0.4"/>
  <circle cx="48" cy="48" r="5" fill="#FFE066" opacity="0.4"/>

  <!-- MC text -->
  <text x="32" y="38" font-family="monospace" font-weight="bold" font-size="22" fill="white" text-anchor="middle">MC</text>

  <!-- Small corner spins (lattice feel) -->
  <circle cx="8" cy="32" r="3" fill="#FF7F45" opacity="0.6"/>
  <circle cx="56" cy="32" r="3" fill="#5CB8E6" opacity="0.6"/>
  <circle cx="32" cy="8" r="3" fill="#FFE066" opacity="0.6"/>
  <circle cx="32" cy="56" r="3" fill="#FF7F45" opacity="0.6"/>
</svg>
